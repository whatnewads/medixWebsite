name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://medix.work
      NEXT_PUBLIC_FORMSPREE_CONTACT_ID: xlgyenjw
      NEXT_PUBLIC_FORMSPREE_LEAD_ID: xkolnbjl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
